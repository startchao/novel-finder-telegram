name: Novel Finder Bot

on:
  workflow_dispatch:
    inputs:
      lifetime_seconds:
        description: "Bot lifetime in seconds (default: 1200 = 20 min)"
        required: false
        default: "1200"
        type: string
  # schedule 已停用：Bot 已遷移至 Render.com webhook 模式，cron polling 不再需要
  # schedule:
  #   - cron: "*/15 * * * *"

concurrency:
  group: novel-bot
  cancel-in-progress: false   # 勿取消正在下載的 job，等它完成後再接班

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Novel Finder Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          BOT_LIFETIME_SECONDS: ${{ github.event.inputs.lifetime_seconds || '1200' }}   # 排程觸發也用 1200 秒
        run: python bot.py
