services:
  - type: web
    name: novel-finder-telegram
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PROXY_BASE
        sync: false
    healthCheckPath: /health
